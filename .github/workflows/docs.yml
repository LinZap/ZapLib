name: Build and Deploy Docs

on:
  push:
    branches: [ master ]
    paths:
      - 'docs/**'
      - 'ZapLib/**/*.cs'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET (for DocFX CLI)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      - name: Install DocFX
        run: dotnet tool install -g docfx
        shell: pwsh

      - name: NuGet Restore (main project only)
        # Restore packages for ZapLib.csproj only — the ZapLibUnitTest
        # project references an internal-only package (Interface-SSO)
        # that is not on public nuget.org. DocFX only needs the main
        # project's metadata anyway.
        run: nuget restore ZapLib\packages.config -PackagesDirectory packages
        shell: pwsh

      - name: Build ZapLib (so DocFX metadata can resolve refs)
        run: msbuild ZapLib\ZapLib.csproj /p:Configuration=Release /m /nologo /verbosity:minimal
        shell: pwsh

      - name: Build DocFX site
        run: docfx docs/docfx.json --logLevel Info
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
